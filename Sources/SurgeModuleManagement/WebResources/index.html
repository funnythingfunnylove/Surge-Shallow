<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>Surge Relay</title>
  <link rel="icon" href="/favicon.ico?v=7" sizes="any">
  <link rel="icon" type="image/png" sizes="1024x1024" href="/brand-icon.png?v=7">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=7">
  <link rel="apple-touch-icon" sizes="512x512" href="/apple-touch-icon-512.png?v=7">
  <link rel="manifest" href="/manifest.webmanifest?v=7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Surge Relay">
  <link rel="stylesheet" href="/app.css?v=72">
  <script src="/app.js?v=80" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="模块列表">
      <div class="sidebar-top">
        <div class="brand-row">
          <span class="brand-mark"><img class="app-icon" src="/brand-icon.png?v=7" alt=""></span>
          <div class="brand-copy"><h1>Surge Relay</h1><p>Web 管理</p></div>
          <div class="toolbar sidebar-toolbar">
            <button class="icon-button" id="add-button" type="button" aria-label="添加模块" title="添加模块"><span class="symbol" data-symbol="plus"></span></button>
            <button class="icon-button" id="refresh-button" type="button" aria-label="更新全部" title="更新全部"><span class="symbol" data-symbol="refresh"></span></button>
            <button class="icon-button" id="settings-button" type="button" aria-label="设置" title="设置"><span class="symbol" data-symbol="gearshape"></span></button>
          </div>
        </div>
        <label class="search-field"><span class="symbol" data-symbol="magnifyingglass"></span><input id="search-input" type="search" placeholder="搜索" autocomplete="off"></label>
      </div>

      <nav class="module-navigation">
        <div class="section-label">汇总模块</div>
        <div id="summary-list"></div>
        <div class="section-label">来源模块</div>
        <div id="module-list" class="module-list"></div>
      </nav>

    </aside>

    <div class="activity-shell">
      <div class="activity-card" id="activity-card" aria-live="polite">
        <div class="activity-line"><span id="activity-status">准备就绪</span><span id="activity-percent"></span></div>
        <div class="progress-track" id="progress-track" hidden><span id="progress-fill"></span></div>
        <div class="latest-update"><strong>最新更新时间</strong><span id="latest-update">尚未更新</span></div>
      </div>
    </div>

    <header class="mobile-header">
      <div class="mobile-title-row">
        <button class="icon-button" id="mobile-back" type="button" aria-label="返回模块列表"><span class="symbol" data-symbol="chevron.left"></span></button>
        <span id="mobile-title-icon" class="mobile-title-icon" aria-hidden="true"></span><strong id="mobile-title">模块</strong><span class="mobile-header-spacer"></span>
      </div>
      <div class="mobile-detail-actions" id="mobile-detail-actions"></div>
    </header>

    <main class="detail" id="detail">
      <header class="desktop-detail-header">
        <div class="desktop-navigation-buttons" aria-label="页面导航">
          <button class="icon-button" id="desktop-back" type="button" aria-label="后退" title="后退"><span class="symbol" data-symbol="chevron.left"></span></button>
          <span class="desktop-navigation-divider" aria-hidden="true"></span>
          <button class="icon-button" id="desktop-forward" type="button" aria-label="前进" title="前进"><span class="symbol" data-symbol="chevron.right"></span></button>
        </div>
        <strong id="desktop-title">模块</strong>
        <div class="desktop-detail-actions" id="desktop-detail-actions"></div>
      </header>
      <div id="detail-content" class="detail-content"></div>
    </main>
  </div>

  <dialog id="module-dialog" class="sheet-dialog">
    <form id="module-form">
      <div class="dialog-header">
        <div><h2 id="dialog-title">添加模块</h2><p>原始地址可以随时修改，已发布的稳定地址不会改变。</p></div>
        <button class="icon-button close-module-dialog" type="button" aria-label="关闭"><span class="symbol" data-symbol="xmark"></span></button>
      </div>
      <div class="form-content">
        <section class="editor-section">
          <h3>基本信息</h3>
          <div class="editor-group">
            <label class="form-row"><span>显示名称</span><input name="name" type="text" required placeholder="例如：YouTube 去广告"></label>
            <label class="form-row switch-row"><span>包含在总模块中</span><input name="isEnabled" type="checkbox" role="switch" checked><span class="toggle-track" aria-hidden="true"></span></label>
          </div>
        </section>
        <section class="editor-section">
          <h3>来源</h3>
          <div class="editor-group">
            <label class="form-row"><span>原始地址</span><input name="sourceURL" type="url" required placeholder="https://example.com/module.plugin"></label>
            <label class="form-row"><span>来源格式</span><select name="sourceFormat"><option value="automatic">自动识别</option><option value="quantumultX">Quantumult X 重写</option><option value="loon">Loon 插件</option><option value="surge">Surge 模块</option></select></label>
          </div>
        </section>
        <section class="editor-section advanced-editor">
          <div class="editor-group">
            <button class="advanced-master" id="advanced-master" type="button" aria-expanded="false"><span class="symbol" data-symbol="chevron.right"></span><strong>高级</strong></button>
            <div class="advanced-master-content" id="advanced-master-content" aria-hidden="true">
              <div class="advanced-master-inner">
                <div class="native-module-note" id="native-module-note" hidden><span class="symbol" data-symbol="arrow.triangle.2.circlepath"></span><span>该地址是 Surge 模块，将直接参与合并，不经过 Script‑Hub；高级转换选项不会应用。</span></div>
                <div id="advanced-options"></div>
              </div>
            </div>
          </div>
          <p class="section-footer">Loon 与 Quantumult X 来源可在这里使用 Script‑Hub 原有的转换控制。</p>
        </section>
      </div>
      <div class="dialog-message" id="module-dialog-message" role="alert" hidden></div>
      <div class="dialog-actions"><button class="button secondary close-module-dialog" type="button">取消</button><button class="button primary" type="submit" id="save-module-button">添加</button></div>
    </form>
  </dialog>

  <dialog id="settings-dialog" class="sheet-dialog settings-dialog">
    <div class="dialog-header">
      <button class="icon-button settings-menu-toggle" id="settings-menu-toggle" type="button" aria-label="设置分类"><span class="symbol" data-symbol="line.3.horizontal"></span></button>
      <div><h2>设置</h2></div>
      <button class="icon-button close-settings-dialog" type="button" aria-label="关闭"><span class="symbol" data-symbol="xmark"></span></button>
    </div>
    <div class="form-content" id="settings-content"></div>
  </dialog>

  <dialog id="icon-dialog" class="sheet-dialog icon-dialog">
    <div class="dialog-header">
      <div><h2>修改模块图标</h2><p>手动输入图片链接，或从 App Store 搜索并选择图标。</p></div>
      <div id="icon-editor-preview" class="icon-editor-preview" aria-hidden="true"></div>
      <button class="icon-button close-icon-dialog" type="button" aria-label="关闭"><span class="symbol" data-symbol="xmark"></span></button>
    </div>
    <div class="form-content icon-editor-content">
      <section class="icon-editor-section">
        <h3>手动导入</h3>
        <div class="icon-editor-group icon-manual-group">
          <label class="icon-input-row" for="custom-icon-url-input">
            <input id="custom-icon-url-input" type="url" placeholder="https://example.com/icon.png">
            <button id="save-custom-icon-button" class="button primary" type="button">载入</button>
          </label>
          <div id="reset-icon-container" class="icon-reset-row" hidden>
            <button id="reset-icon-button" class="button" type="button"><span class="symbol" data-symbol="arrow.uturn.backward"></span>恢复默认图标</button>
          </div>
        </div>
      </section>
      <section class="icon-editor-section">
        <h3>从 App Store 搜索</h3>
        <div class="icon-editor-group icon-store-group">
          <div class="icon-search-row">
            <select id="icon-search-region-select" aria-label="地区">
            <option value="cn">🇨🇳 中国</option>
            <option value="us">🇺🇸 美国</option>
            <option value="jp">🇯🇵 日本</option>
            <option value="hk">🇭🇰 香港</option>
            <option value="tw">🇹🇼 台湾</option>
            </select>
            <input id="icon-search-input" type="text" placeholder="输入 App 名称或关键字">
            <button id="search-icon-button" class="button" type="button">搜索</button>
          </div>
          <div id="icon-search-results" class="icon-search-results">
            <div class="icon-search-empty">请输入关键字进行搜索</div>
          </div>
        </div>
      </section>
    </div>
    <div class="dialog-actions icon-dialog-actions">
      <button class="button" id="cancel-icon-dialog" type="button">取消</button>
      <span></span>
      <button class="button primary" id="done-icon-dialog" type="button">完成</button>
    </div>
  </dialog>

  <dialog id="confirm-dialog" class="confirm-dialog">
    <div class="confirm-content"><span class="confirm-icon symbol" data-symbol="exclamationmark.triangle"></span><h2 id="confirm-title">确认操作</h2><p id="confirm-message"></p></div>
    <div class="dialog-actions"><button class="button secondary" id="confirm-cancel" type="button">取消</button><button class="button destructive" id="confirm-accept" type="button">确认</button></div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
